specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Rask AI
providerId: rask
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- AI
- Video Localization
- Dubbing
- Translation
- Transcription
- Plans
description: >-
  Rask AI uses a per-minute, subscription-based pricing model. Each plan
  includes a monthly allotment of localization minutes (where 1 minute equals
  1 minute of final translated output); enhanced lip-sync consumes minutes at a
  higher multiplier. API access is available with paid plans, and API
  capabilities correspond to the features included in the selected plan.
  Additional minutes on the Business plan and above are billed per minute.
notes: >-
  Plan names, prices, and included minutes as published on the Rask AI pricing
  page (rask.ai/pricing); verify current values on reconciliation as promotions
  and tiers change. Annual prices reflect promotional discounts at capture time.
sources:
- https://www.rask.ai/pricing
- https://www.rask.ai/api
- https://docs.api.rask.ai
plans:
- id: rask-free-trial
  name: Free Trial
  type: free
  description: >-
    7-day trial with no credit card required for evaluating the platform.
  entries:
  - label: Included Minutes
    name: included_minutes
    type: included
    metric: minutes
    limit: 3
    timeFrame: month
    geo: global
    unit: 1
    price: $0
    userMultiplied: false
  elements:
  - name: Transcription
  - name: Translation
  - name: Dubbing
- id: rask-creator
  name: Creator
  type: subscription
  description: >-
    Entry paid plan for individual creators. $60/month, or $33/month billed
    annually with promotional discount.
  entries:
  - label: Included Minutes
    name: included_minutes
    type: included
    metric: minutes
    limit: 25
    timeFrame: month
    geo: global
    unit: 1
    price: $60 per month (from $33/month billed annually)
    userMultiplied: false
  elements:
  - name: Transcription
  - name: Translation
  - name: Dubbing
  - name: API Access
- id: rask-creator-pro
  name: Creator Pro
  type: subscription
  description: >-
    Advanced creator plan including lip-sync and subtitles. $150/month, or
    $78/month billed annually with promotional discount.
  entries:
  - label: Included Minutes
    name: included_minutes
    type: included
    metric: minutes
    limit: 100
    timeFrame: month
    geo: global
    unit: 1
    price: $150 per month (from $78/month billed annually)
    userMultiplied: false
  elements:
  - name: Transcription
  - name: Translation
  - name: Dubbing
  - name: Lip-Sync
  - name: Subtitles
  - name: API Access
- id: rask-business
  name: Business
  type: subscription
  description: >-
    Team/business plan with larger minute allotments and per-minute overage.
    $750/month, or $600/month billed annually.
  entries:
  - label: Included Minutes
    name: included_minutes
    type: included
    metric: minutes
    limit: 500
    timeFrame: month
    geo: global
    unit: 1
    price: $750 per month (from $600/month billed annually)
    userMultiplied: false
  - label: Additional Minutes
    name: extra_minutes
    type: usage
    metric: minutes
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $3 per extra minute
    userMultiplied: false
  elements:
  - name: Transcription
  - name: Translation
  - name: Dubbing
  - name: Lip-Sync
  - name: Voice Cloning
  - name: API Access
- id: rask-enterprise
  name: Enterprise
  type: enterprise
  description: >-
    Custom plan from 2,000 minutes/month with dedicated support and custom
    contracts. Contact Rask AI sales.
  entries:
  - label: Enterprise Agreement
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: Custom Volume Minutes
  - name: Dedicated Support
  - name: Custom Contracts
  - name: API Access
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
