description: >-
  FinOps view of Rask AI spend. Rask bills on a subscription, per-minute model:
  each plan includes a monthly allotment of localization minutes (1 minute = 1
  minute of final translated output), with enhanced lip-sync consuming minutes
  at a higher multiplier (e.g., 3x). On the Business plan and above, additional
  minutes beyond the allotment are billed per minute (about $3 per extra
  minute). Cost is driven by the number and duration of dubbing, translation,
  and transcription jobs run against the plan's minute budget.
notes: >-
  Per-minute and plan rates are subject to change and may include promotional
  discounts; verify against the Rask AI pricing page during reconciliation.
