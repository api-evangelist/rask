meters:
- name: included_minutes
  description: Localization minutes included in the subscribed plan, consumed by dubbing, translation, and transcription jobs.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - plan
- name: extra_minutes
  description: Additional minutes beyond the plan allotment, billed per minute (Business plan and above, about $3/min).
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - plan
- name: lipsync_minutes
  description: Minutes consumed by lip-sync; enhanced lip-sync bills at a higher multiplier (e.g., 3x standard).
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - project
principles:
- name: Visibility
  description: Track localization minutes consumed per project and per language against the plan's monthly allotment via the account credits/usage view.
- name: Allocation
  description: Tag projects per workload/team/language and map minute consumption to internal cost centers.
- name: Optimization
  description: Reuse and edit transcriptions before generating, batch shorter clips, and reserve enhanced lip-sync (higher minute multiplier) for content that needs it; right-size the plan to expected monthly minutes to avoid per-minute overage.
- name: Accountability
  description: Assign owners per project; review minute burn monthly against the plan budget before incurring per-minute overage.
