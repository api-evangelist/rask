    type: Documentation
  - url: https://docs.api.rask.ai/api-reference/project/create_project
    type: APIReference
  - url: openapi/rask-openapi.yml
    type: OpenAPI
  - url: collections/rask.postman_collection.json
    type: PostmanCollection
  - url: collections/rask.opencollection.json
    type: OpenCollection
  description: Create and manage localization projects (dubbing jobs) from an uploaded
    video, specifying source and destination languages, speaker count, transcription,
    and glossary. Projects are processed asynchronously and return translated video,
    translated audio, and voiceover artifacts.
