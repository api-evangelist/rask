aid: rask
url: https://raw.githubusercontent.com/api-evangelist/rask/refs/heads/main/apis.yml
name: Rask AI
kind: company
description: Rask AI is an AI video and audio localization platform offering automated
  dubbing, translation, transcription, voice cloning, and lip-sync across 130+ languages.
  Its REST API lets developers upload media, transcribe and translate it, create
  localization projects, and retrieve dubbed video, audio, and voiceover artifacts
  programmatically using an OAuth2 Bearer token.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- Video Localization
- Dubbing
- Translation
- Transcription
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
apis:
- aid: rask:projects-dubbing-jobs
  name: Rask AI Projects & Dubbing Jobs API
  tags:
  - Projects
  - Dubbing
  - Localization
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
